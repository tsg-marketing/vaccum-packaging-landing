# Пример конфигурации для nginx (для админа хостинга vacuum.t-sib.ru)
# Добавьте этот блок в конфиг сайта, чтобы работали прямые ссылки на SPA-маршруты
# (например /traysealers, /termousadka)

server {
    listen 80;
    server_name vacuum.t-sib.ru;
    root /var/www/vacuum.t-sib.ru;
    index index.html;

    # Отдаём статику напрямую, а любые несуществующие пути — в index.html (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэширование статики
    location ~* \.(js|css|svg|woff2?|ttf|eot|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML не кэшируем
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
